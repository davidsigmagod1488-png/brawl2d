<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars 2D: Магазин, Бійці та Піни</title>
    <style>
        body {
            margin: 0; padding: 0; background: #0b0e26;
            font-family: 'Impact', 'Arial Black', sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh;
            color: #fff; user-select: none;
        }

        /* Ігрові екрани */
        .screen { display: none; width: 750px; height: 480px; border-radius: 12px; border: 5px solid #f1c40f; position: relative; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .active { display: block; }

        /* ЛІВЕ БОКОВЕ МЕНЮ */
        .left-menu {
            position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 12px; z-index: 50;
        }
        .menu-side-btn {
            background: linear-gradient(#34495e, #2c3e50); border: 2px solid #fff;
            color: #fff; padding: 10px 15px; font-size: 14px; border-radius: 10px;
            cursor: pointer; text-shadow: 1px 1px #000; font-family: inherit; width: 110px; text-align: center;
            box-shadow: 0 4px 0 #1a252f;
        }
        .menu-side-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1a252f; }

        /* ТОП БАР */
        .top-bar { display: flex; justify-content: space-between; padding: 10px 20px; background: rgba(0,0,0,0.6); font-size: 16px; border-bottom: 3px solid #f1c40f; }
        .stat { display: flex; align-items: center; gap: 6px; font-weight: bold; text-shadow: 2px 2px #000; }

        /* ГОЛОВНЕ МЕНЮ */
        #menu-screen { background: linear-gradient(180deg, #101642, #1b277a); text-align: center; }
        .game-title { font-size: 50px; color: #fff; text-shadow: 4px 4px 0 #000; margin-top: 20px; }
        .brawler-showcase { font-size: 90px; margin: 15px 0; animation: float 1.5s infinite alternate; }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        .btn-play { background: #ff4757; color: #fff; border: 4px solid #fff; padding: 10px 50px; font-size: 28px; border-radius: 40px; cursor: pointer; text-shadow: 3px 3px #000; box-shadow: 0 6px 0 #bc1424; font-family: inherit; }
        .btn-play:active { transform: translateY(4px); box-shadow: 0 2px 0 #bc1424; }
        .btn-starr { background: #3498db; font-size: 18px; padding: 8px 25px; border-radius: 20px; border: 2px solid #fff; margin-top: 15px; cursor: pointer; display: inline-block; }

        /* ЕКРАН БІЙЦІВ */
        #brawlers-screen { background: #111430; padding: 15px; box-sizing: border-box; }
        .grid-container { display: flex; gap: 12px; overflow-x: auto; padding: 10px 5px; height: 320px; align-items: center; }
        .brawler-card { background: #1c224e; border: 3px solid #4b5563; border-radius: 12px; width: 130px; padding: 10px; text-align: center; flex-shrink: 0; }
        .brawler-card.equipped { border-color: #f1c40f; box-shadow: 0 0 12px #f1c40f; }

        /* ЕКРАН МАГАЗИНУ */
        #shop-screen { background: #0c0f24; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; }
        .shop-tabs { display: flex; gap: 15px; border-bottom: 3px solid #f1c40f; padding-bottom: 8px; }
        .shop-tab-btn { background: #2c3e50; border: 2px solid #fff; color: white; padding: 6px 15px; border-radius: 8px; cursor: pointer; font-family: inherit; }
        .shop-tab-btn.active-tab { background: #f1c40f; color: black; border-color: black; }
        .shop-section { display: none; gap: 15px; margin-top: 15px; overflow-x: auto; padding-bottom: 10px; }
        .shop-section.active-section { display: flex; }
        .shop-item { background: #1b204a; border: 3px solid #3498db; border-radius: 12px; width: 145px; padding: 10px; text-align: center; flex-shrink: 0; display: flex; flex-direction: column; justify-content: space-between; height: 240px; }
        .item-cost { font-size: 14px; margin-top: auto; padding: 4px; background: rgba(0,0,0,0.4); border-radius: 6px; }

        /* ЕКРАН НОВИН */
        #news-screen { background: #161a36; padding: 30px; box-sizing: border-box; text-align: center; }
        .news-box { background: rgba(0,0,0,0.4); border: 2px solid #f1c40f; border-radius: 10px; padding: 20px; font-size: 18px; line-height: 1.6; height: 260px; overflow-y: auto; }

        /* АРЕНА БОЮ ТА ЕФЕКТИ */
        #arena-screen { background: #1a2557; cursor: crosshair; }
        .map-bush { position: absolute; background: #27ae60; border-radius: 10px; opacity: 0.85; }
        .player-char { position: absolute; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 6px 12px rgba(0,0,0,0.5); z-index: 10; border: 3px solid #fff; background: #2980b9; }
        .bot-char { position: absolute; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 6px 12px rgba(0,0,0,0.5); z-index: 9; border: 3px solid #e74c3c; background: #c0392b; }
        .bullet, .super-bullet { position: absolute; width: 10px; height: 10px; background: #f1c40f; border-radius: 50%; box-shadow: 0 0 8px #f1c40f; z-index: 15; }
        .super-bullet { width: 20px; height: 20px; background: #9b59b6; box-shadow: 0 0 15px #9b59b6; }
        #arena-gem { position: absolute; width: 20px; height: 20px; background: #00d2d3; border-radius: 4px; transform: rotate(45deg); box-shadow: 0 0 15px #00d2d3; }

        /* ХОД БОЮ ТА ПІНИ */
        .battle-hud { position: absolute; bottom: 15px; left: 15px; display: flex; gap: 12px; z-index: 30; }
        .hud-bar { width: 100px; height: 25px; background: #222; border: 2px solid #fff; border-radius: 5px; overflow: hidden; position: relative; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .hud-fill { position: absolute; left: 0; top: 0; height: 100%; width: 100%; transition: width 0.1s; }
        #hp-fill { background: #2ecc71; }
        #super-fill { background: #f1c40f; width: 0; }
        #hyper-fill { background: #9b59b6; width: 0; }
        
        /* Кнопка Пінів та Меню пінів у бою */
        .pin-trigger-btn { position: absolute; right: 15px; bottom: 80px; width: 45px; height: 45px; background: #e67e22; border: 2px solid #fff; border-radius: 50%; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 40; box-shadow: 0 4px 0 #a05105; }
        .pin-menu { display: none; position: absolute; right: 70px; bottom: 80px; background: rgba(0,0,0,0.85); border: 2px solid #fff; border-radius: 10px; padding: 8px; gap: 8px; z-index: 45; }
        .pin-option { font-size: 24px; cursor: pointer; background: none; border: none; padding: 2px; }
        .player-pin-bubble { position: absolute; background: white; color: black; border-radius: 10px; padding: 4px 8px; font-size: 20px; font-weight: normal; border: 2px solid #000; top: -40px; left: 50%; transform: translateX(-50%); z-index: 100; display: none; }

        /* ДОРОГА СТАРР */
        #starr-screen { background: #070919; padding: 15px; box-sizing: border-box; }
        #result-screen { background: #060814; text-align: center; padding-top: 60px; box-sizing: border-box; }
        .reward-grid { display: flex; justify-content: center; gap: 40px; margin: 40px 0; font-size: 28px; }
        .close-screen-btn { background: #e74c3c; color: white; border: 2px solid #fff; padding: 6px 20px; border-radius: 8px; cursor: pointer; font-family: inherit; margin-top: auto; align-self: center; }
    </style>
</head>
<body>

    <!-- ВСЕОПОРНИЙ ЕКРАН ГРИ -->
    <!-- 1. ГОЛОВНЕ МЕНЮ -->
    <div id="menu-screen" class="screen active">
        <div class="top-bar">
            <div class="stat">🏆 КУБКИ: <span id="m-trophies">0</span></div>
            <div class="stat">💎 КРИСТАЛИ: <span id="m-gems-currency">50</span></div>
            <div class="stat">✨ БЛІНГИ: <span id="m-blings">100</span></div>
            <div class="stat">✉️ КРЕДИТИ: <span id="m-credits">0</span></div>
        </div>

        <!-- ЛІВЕ БОКОВЕ МЕНЮ ЗЛІВА ПОСЕРЕДИНІ -->
        <div class="left-menu">
            <button class="menu-side-btn" onclick="openShopScreen()">🛒 МАГАЗИН</button>
            <button class="menu-side-btn" onclick="openBrawlersScreen()">🤼‍♂️ БІЙЦІ</button>
            <button class="menu-side-btn" onclick="openNewsScreen()">📰 НОВИНИ</button>
        </div>

        <div class="game-title">BRAWL STARS</div>
        <div id="m-brawler-emoji" class="brawler-showcase">🤠</div>
        <div id="m-brawler-name" style="font-size: 24px; color: #f1c40f; text-shadow: 2px 2px #000; margin-bottom: 25px;">Shelly</div>
        
        <button class="btn-play" onclick="startBrawlMatch()">У БІЙ! ⚔️</button><br>
        <button class="btn-starr" onclick="openStarrPage()">Дорога Старр 🚀</button>
    </div>

    <!-- 2. ЕКРАН БІЙЦІВ -->
    <div id="brawlers-screen" class="screen">
        <h2 style="color: #f1c40f; text-align: center; margin-top: 10px;">ТВОЇ БІЙЦІ</h2>
        <div class="grid-container" id="brawlers-list-container"></div>
        <div style="text-align: center;"><button class="close-screen-btn" onclick="backToMenuFromAny()">НАЗАД В МЕНЮ</button></div>
    </div>

    <!-- 3. ЕКРАН МАГАЗИНУ -->
    <div id="shop-screen" class="screen">
        <div class="top-bar" style="border:none; background:none; padding: 5px 10px;">
            <div class="stat">💎 <span id="shop-gems">50</span></div>
            <div class="stat">✨ <span id="shop-blings">100</span></div>
        </div>
        <div class="shop-tabs">
            <button class="shop-tab-btn active-tab" onclick="switchShopTab('offers')">НАЙКРАЩІ АКЦІЇ</button>
