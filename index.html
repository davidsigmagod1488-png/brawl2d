<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars 2D Fixed</title>
    <style>
        body {
            margin: 0; padding: 0; background: #130f40;
            font-family: sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh;
            color: #fff; user-select: none;
        }
        h1 { color: #f1c40f; margin: 10px 0; text-shadow: 2px 2px #000; }
        #score-board { font-size: 20px; font-weight: bold; margin-bottom: 10px; }
        #arena {
            position: relative; width: 600px; height: 400px;
            background: #27ae60; border: 8px solid #2c3e50; border-radius: 10px;
        }
        .bush { position: absolute; background: #1e824c; border-radius: 5px; }
        .char {
            position: absolute; width: 40px; height: 40px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 24px;
        }
        #shelly { background: #9b59b6; border: 2px solid #fff; z-index: 10; }
        #elprimo { background: #e74c3c; border: 2px solid #f1c40f; z-index: 5; }
        #gem {
            position: absolute; width: 20px; height: 20px;
            background: #00d2d3; transform: rotate(45deg); box-shadow: 0 0 10px #00d2d3;
        }
        #game-over {
            display: none; position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .btn {
            background: #f1c40f; color: #000; border: none;
            padding: 10px 20px; font-size: 18px; font-weight: bold;
            border-radius: 20px; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>

    <h1>BRAWL STARS 2D 🌟</h1>
    <div id="score-board">💎 Кристали: <span id="gems-count">0</span></div>

    <div id="arena">
        <!-- Кущі -->
        <div class="bush" style="width: 100px; height: 50px; top: 50px; left: 50px;"></div>
        <div class="bush" style="width: 100px; height: 50px; bottom: 50px; right: 50px;"></div>

        <!-- Об'єкти -->
        <div id="shelly" class="char">🤠</div>
        <div id="elprimo" class="char">🤼‍♂️</div>
        <div id="gem"></div>

        <!-- Меню програшу -->
        <div id="game-over">
            <h2 style="color: #e74c3c; margin: 0;">НОКАУТ! 💀</h2>
            <button class="btn" onclick="restartGame()">У бій! ⚔️</button>
        </div>
    </div>

    <p style="color: #aaa; font-size: 14px;">Керування: Стрілочки або клавіші W, A, S, D (англійська розкладка)</p>

    <script>
        const shelly = document.getElementById('shelly');
        const elprimo = document.getElementById('elprimo');
        const gem = document.getElementById('gem');
        const gameOver = document.getElementById('game-over');
        const scoreText = document.getElementById('gems-count');

        let sX = 100, sY = 180;
        let eX = 450, eY = 180;
        let gX = 280, gY = 180;
        let score = 0;
        let isDead = false;

        const keys = {};

        function updatePositions() {
            shelly.style.left = sX + 'px';
            shelly.style.top = sY + 'px';
            elprimo.style.left = eX + 'px';
            elprimo.style.top = eY + 'px';
            gem.style.left = gX + 'px';
            gem.style.top = gY + 'px';
        }

        // Прив'язуємо керування до вікна
        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        function loop() {
            if (isDead) return;

            // Рух Шеллі
            if (keys['w'] || keys['arrowup']) sY -= 5;
            if (keys['s'] || keys['arrowdown']) sY += 5;
            if (keys['a'] || keys['arrowleft']) sX -= 5;
            if (keys['d'] || keys['arrowright']) sX += 5;

            // Межі карти
            sX = Math.max(0, Math.min(560, sX));
            sY = Math.max(0, Math.min(360, sY));

            // Рух Ель Прімо за Шеллі
            let dx = sX - eX;
            let dy = sY - eY;
            let dist = Math.hypot(dx, dy);
            if (dist > 5) {
                eX += (dx / dist) * 2;
                eY += (dy / dist) * 2;
            }

            // Перевірка на кристал
            if (Math.hypot(sX - gX, sY - gY) < 30) {
                score++;
                scoreText.innerText = score;
                gX = Math.random() * 500 + 30;
                gY = Math.random() * 300 + 30;
            }

            // Зіткнення з ворогом
            if (Math.hypot(sX - eX, sY - eY) < 30) {
                isDead = true;
                gameOver.style.display = 'flex';
            }

            updatePositions();
            requestAnimationFrame(loop);
        }

        function restartGame() {
            sX = 100; sY = 180;
            eX = 450; eY = 180;
            score = 0;
            scoreText.innerText = score;
            isDead = false;
            gameOver.style.display = 'none';
            updatePositions();
            loop();
        }

        updatePositions();
        loop();
    </script>
</body>
</html>
