<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars 2D Mega Edition</title>
    <style>
        body {
            margin: 0; padding: 0; background: #0b0e26;
            font-family: 'Impact', 'Arial Black', sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh;
            color: #fff; user-select: none;
        }

        /* Головний контейнер гри */
        .screen { display: none; width: 750px; height: 480px; border-radius: 12px; border: 5px solid #f1c40f; position: relative; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .active { display: block !important; }

        /* ЕКРАН МЕНЮ */
        #menu-screen { background: linear-gradient(180deg, #101642, #1b277a); }
        .top-bar { display: flex; justify-content: space-between; padding: 10px 15px; background: rgba(0,0,0,0.6); font-size: 16px; border-bottom: 3px solid #f1c40f; }
        .stat-group { display: flex; gap: 15px; }
        .stat { display: flex; align-items: center; gap: 5px; text-shadow: 2px 2px #000; }
        
        /* Бокове меню ліворуч посередині */
        .side-menu { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        .side-btn { width: 110px; padding: 10px; background: #2980b9; border: 3px solid #fff; color: #fff; font-size: 14px; font-weight: bold; border-radius: 10px; cursor: pointer; text-shadow: 1px 1px #000; text-transform: uppercase; text-align: center; }
        .side-btn:active { transform: scale(0.95); }
        #btn-shop { background: #e67e22; }
        #btn-brawlers { background: #9b59b6; }
        #btn-news { background: #7f8c8d; }

        /* Центр меню */
        .menu-center { position: absolute; right: 50px; bottom: 40px; display: flex; flex-direction: column; align-items: center; width: 350px; }
        .brawler-showcase { font-size: 100px; margin-bottom: 10px; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        .btn-play { background: #ff4757; color: #fff; border: 4px solid #fff; padding: 12px 60px; font-size: 32px; border-radius: 40px; cursor: pointer; text-shadow: 3px 3px #000; box-shadow: 0 6px 0 #bc1424; width: 100%; text-transform: uppercase; }
        .btn-play:active { transform: translateY(4px); box-shadow: 0 2px 0 #bc1424; }
        .starr-road-bar { background: rgba(0,0,0,0.5); border: 2px solid #3498db; border-radius: 10px; padding: 5px 15px; font-size: 14px; margin-bottom: 10px; cursor: pointer; width: 80%; text-align: center; }

        /* ЕКРАН ВИБОРУ РЕЖИМІВ */
        #mode-screen { background: #111322; padding: 20px; box-sizing: border-box; text-align: center; }
        .mode-container { display: flex; gap: 15px; justify-content: center; margin-top: 50px; }
        .mode-card { width: 210px; height: 230px; background: #1c1f35; border: 3px solid #34495e; border-radius: 15px; padding: 15px; box-sizing: border-box; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; align-items: center; }
        .mode-card:hover { border-color: #f1c40f; background: #252947; }
        .mode-icon { font-size: 50px; }

        /* ЕКРАН МАГАЗИНУ */
        #shop-screen { background: #070919; padding: 15px; box-sizing: border-box; }
        .shop-tabs { display: flex; gap: 10px; border-bottom: 3px solid #e67e22; padding-bottom: 8px; }
        .shop-tab-btn { background: #2c3e50; border: none; color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 14px; }
        .shop-tab-btn.active-tab { background: #e67e22; font-weight: bold; }
        .shop-content { display: none; gap: 15px; margin-top: 20px; overflow-x: auto; height: 320px; align-items: center; }
        .shop-content.active-content { display: flex; }
        .shop-item { background: #1c234e; border: 3px solid #f1c40f; border-radius: 12px; width: 150px; height: 250px; padding: 10px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; align-items: center; flex-shrink: 0; }

        /* ЕКРАН БІЙЦІВ */
        #brawlers-screen { background: #15162b; padding: 20px; box-sizing: border-box; }
        .brawler-grid { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 30px; justify-content: center; }
        .brawler-card { background: #242542; border: 3px solid #4b5563; border-radius: 12px; width: 110px; padding: 10px; text-align: center; cursor: pointer; }
        .brawler-card.owned { border-color: #2ecc71; }
        .brawler-card.selected-hero { border-color: #f1c40f; box-shadow: 0 0 10px #f1c40f; }

        /* ЕКРАН НОВИН */
        #news-screen { background: #111; padding: 30px; text-align: center; }

        /* ДОРОГА СТАРР */
        #starr-screen { background: #070919; padding: 20px; text-align: center; }
        .starr-box { background: #1c234e; border: 4px solid #3498db; border-radius: 15px; display: inline-block; padding: 30px; margin-top: 50px; width: 300px; }

        /* АРЕНА БОЮ */
        #arena-screen { background: #1a2557; cursor: crosshair; }
        .map-bush { position: absolute; background: #27ae60; border-radius: 8px; opacity: 0.85; }
        .char { position: absolute; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; border: 2px solid #fff; }
        .bullet { position: absolute; width: 8px; height: 8px; background: #f1c40f; border-radius: 50%; box-shadow: 0 0 5px #f1c40f; }
        .super-bullet { position: absolute; width: 16px; height: 16px; background: #9b59b6; border-radius: 50%; box-shadow: 0 0 10px #9b59b6; }
        .gem { position: absolute; width: 18px; height: 18px; background: #00d2d3; border-radius: 3px; transform: rotate(45deg); }

        /* Кнопка пінів */
        .pin-btn { position: absolute; right: 20px; bottom: 20px; width: 50px; height: 50px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; z-index: 50; }
        .pin-menu { display: none; position: absolute; right: 80px; bottom: 20px; background: rgba(0,0,0,0.8); border: 2px solid #fff; padding: 10px; border-radius: 10px; gap: 10px; z-index: 51; }

        /* ЕКРАН РЕЗУЛЬТАТІВ */
        #result-screen { background: #000; text-align: center; padding-top: 80px; }

        /* Спільна кнопка закриття екранів */
        .close-btn { background: #e74c3c; border: 2px solid #fff; padding: 8px 20px; border-radius: 10px; color: white; cursor: pointer; font-size: 14px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <!-- 1. ГОЛОВНЕ МЕНЮ -->
    <div id="menu-screen" class="screen active">
        <div class="top-bar">
            <div class="stat-group">
                <div class="stat">🏆 <span id="m-trophies">0</span></div>
                <div class="stat">💎 <span id="m-gems">50</span></div>
                <div class="stat">✨ Блінг: <span id="m-blings">100</span></div>
            </div>
            <div class="stat">✉️ Кредити: <span id="m-credits">0</span></div>
        </div>

        <!-- Бокове меню ліворуч -->
        <div class="side-menu">
            <button class="side-btn" id="btn-shop" onclick="openScreen('shop-screen')">Магазин</button>
            <button class="side-btn" id="btn-brawlers" onclick="openScreen('brawlers-screen')">Бійці</button>
            <button class="side-btn" id="btn-news" onclick="openScreen('news-screen')">Новини</button>
        </div>

        <!-- Права центральна частина меню -->
        <div class="menu-center">
            <div id="starr-bar" class="starr-road-bar" onclick="openScreen('starr-screen')">
                🚀 На Дорозі Старр: <span id="target-brawler">Nita</span>
            </div>
            <div id="hero-preview" class="brawler-showcase">🤠</div>
            <div id="hero-name" style="font-size: 22px; color: #f1c40f; margin-bottom: 15px;">Shelly</div>
            <button class="btn-play" onclick="openScreen('mode-screen')">У БІЙ! ⚔️</button>
        </div>
    </div>

    <!-- 2. ВИБІР РЕЖИМІВ -->
    <div id="mode-screen" class="screen">
        <h2 style="text-align: center; margin-top: 20px; color: #f1c40f;">ОБЕРИ РЕЖИМ БОЮ</h2>
        <div class="mode-container">
            <div class="mode-card" onclick="startMatch('crystals')">
                <div class="mode-icon">💎</div>
                <h3>Захват Кристалів</h3>
                <p style="font-size: 12px; color: #aaa;">Режим 3 на 3 з ботами</p>
            </div>
            <div class="mode-card" onclick="startMatch('showdown')">
                <div class="mode-icon">🌵</div>
                <h3>Шоудаун</h3>
                <p style="font-size: 12px; color: #aaa;">Королівська битва</p>
            </div>
            <div class="mode-card" onclick="startMatch('5v5')">
                <div class="mode-icon">🔥</div>
                <h3>Режим 5 на 5</h3>
                <p style="font-size: 12px; color: #aaa;">Хто більше зробить кілів</p>
            </div>
        </div>
        <div style="text-align: center;"><button class="close-btn" onclick="openScreen('menu-screen')">Назад</button></div>
    </div>

    <!-- 3. МАГАЗИН -->
    <div id="shop-screen" class="screen">
        <div class="shop-tabs">
            <button class="shop-tab-btn active-tab" onclick="switchShopTab('deals')">Найкращі акції</button>
            <button class="shop-tab-btn" onclick="switchShopTab('skins')">Лавка дивацтв</button>
            <button class="close-btn" style="margin: 0; margin-left: auto; padding: 4px 12px;" onclick="openScreen('menu-screen')">Х</button>
        </div>

        <!-- Вкладка 1: Найкращі Акції -->
        <div id="tab-deals" class="shop-content active-content">
            <div class="shop-item">
