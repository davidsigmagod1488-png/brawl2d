<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Stars 2D Mega Evolution</title>
    <style>
        body {
            margin: 0; padding: 0; background: #0b0e26;
            font-family: 'Impact', 'Arial Black', sans-serif; display: flex; flex-direction: column;
            align-items: center; justify-content: center; min-height: 100vh;
            color: #fff; user-select: none; overflow: hidden;
        }

        .screen { display: none; width: 800px; height: 520px; border-radius: 15px; border: 5px solid #f1c40f; position: relative; overflow: hidden; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .active { display: block; }

        /* ГОЛОВНЕ МЕНЮ */
        #menu-screen { background: linear-gradient(180deg, #101642, #1b277a); }
        .top-bar { display: flex; justify-content: space-between; padding: 12px 20px; background: rgba(0,0,0,0.6); font-size: 18px; border-bottom: 3px solid #f1c40f; }
        .stat { display: flex; align-items: center; gap: 6px; font-weight: bold; text-shadow: 2px 2px #000; }
        
        /* Бокове меню зліва посередині */
        .side-menu { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 12px; z-index: 10; }
        .side-btn { width: 110px; padding: 10px; background: #2980b9; border: 3px solid #fff; border-radius: 10px; color: #fff; font-size: 14px; cursor: pointer; text-shadow: 1px 1px #000; font-family: inherit; text-transform: uppercase; box-shadow: 0 4px 0 #1f4f6e; }
        .side-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #1f4f6e; }
        #btn-shop { background: #f39c12; box-shadow: 0 4px 0 #b76b00; }

        .center-lobby { text-align: center; margin-top: 20px; }
        .brawler-showcase { font-size: 110px; margin: 10px 0; animation: float 1.5s infinite alternate; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        
        .main-play-btn { background: #ff4757; color: #fff; border: 4px solid #fff; padding: 12px 70px; font-size: 32px; border-radius: 40px; cursor: pointer; text-shadow: 3px 3px #000; box-shadow: 0 6px 0 #bc1424; font-family: inherit; margin-top: 10px; }
        .main-play-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #bc1424; }

        /* ВІКНА МЕНЮ (МАГАЗИН, БІЙЦІ, ДОРОГА СТАРР) */
        .sub-screen { width: 100%; height: 100%; background: #0c0f24; padding: 25px; box-sizing: border-box; position: absolute; top:0; left:0; z-index: 50; display: none; flex-direction: column; }
        .sub-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #3498db; padding-bottom: 8px; margin-bottom: 15px; }
        .back-btn { background: #7f8c8d; border: 2px solid #fff; color:#fff; padding: 6px 20px; border-radius: 10px; cursor: pointer; font-family: inherit; }
        .grid-scroll { display: flex; gap: 15px; overflow-x: auto; padding: 10px 5px; align-items: center; min-height: 280px; }
        
        /* КАРТКИ */
        .item-card { background: #1a1f3c; border: 3px solid #4b5563; border-radius: 12px; width: 145px; padding: 12px 8px; text-align: center; flex-shrink: 0; display: flex; flex-direction: column; justify-content: space-between; height: 240px; }
        .item-card.unlocked { border-color: #2ecc71; }
        .item-card.active-brawler { border-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; }
        .rarity { font-size: 11px; font-weight: bold; text-transform: uppercase; padding: 2px 5px; border-radius: 4px; display: inline-block; margin-bottom: 5px; }
        
        /* Магазин акцій */
        .shop-section-title { font-size: 18px; color: #f1c40f; margin: 10px 0 5px 0; text-align: left; }
        .skin-btn { background: #9b59b6; border: 2px solid #fff; color: white; padding: 4px; font-size: 11px; border-radius: 5px; cursor: pointer; margin-top: 3px; font-family: inherit; }

        /* СПИСОК РЕЖИМІВ */
        #modes-screen { background: rgba(11, 14, 38, 0.95); text-align: center; }
        .mode-select-box { display: flex; justify-content: center; gap: 20px; margin-top: 60px; }
        .mode-card { background: #1b2246; border: 4px solid #3498db; border-radius: 15px; width: 210px; height: 230px; padding: 20px; box-sizing: border-box; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; align-items: center; transition: 0.2s; }
        .mode-card:hover { transform: scale(1.05); border-color: #f1c40f; }

        /* АРЕНА БОЮ */
        #arena-screen { background: #1a2557; cursor: crosshair; }
        .player-char, .bot-char { position: absolute; width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 5px 10px rgba(0,0,0,0.5); z-index: 10; border: 3px solid #fff; }
        .player-char { background: #2980b9; }
        .bot-char { background: #c0392b; border-color: #e74c3c; }
        .bullet, .super-bullet { position: absolute; border-radius: 50%; z-index: 15; }
        .bullet { width: 9px; height: 9px; background: #f1c40f; box-shadow: 0 0 8px #f1c40f; }
        .super-bullet { width: 18px; height: 18px; background: #9b59b6; box-shadow: 0 0 15px #9b59b6; }
        #arena-gem { position: absolute; width: 20px; height: 20px; background: #00d2d3; border-radius: 4px; transform: rotate(45deg); box-shadow: 0 0 12px #00d2d3; }

        /* Кнопка три крапки (ПІНИ) */
        .pin-trigger-btn { position: absolute; bottom: 60px; right: 20px; width: 45px; height: 45px; background: rgba(0,0,0,0.6); border: 2px solid #fff; border-radius: 50%; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 40; }
        .pins-menu { display: none; position: absolute; bottom: 115px; right: 20px; background: rgba(0,0,0,0.85); border: 2px solid #f1c40f; border-radius: 10px; padding: 8px; gap: 10px; z-index: 45; }
        .pin-item { font-size: 26px; cursor: pointer; transition: transform 0.1s; }
        .pin-item:hover { transform: scale(1.2); }
        
        /* Бульбашка піна над гравцем */
        .pin-bubble { display: none; position: absolute; background: white; border: 2px solid #000; border-radius: 10px; padding: 3px 6px; font-size: 20px; z-index: 12; transform: translate(-10px, -45px); }

        /* HUD БОЮ */
        .battle-hud { position: absolute; bottom: 12px; left: 15px; display: flex; gap: 12px; z-index: 30; }
        .hud-bar { width: 110px; height: 24px; background: #222; border: 2px solid #fff; border-radius: 5px; overflow: hidden; position: relative; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .hud-fill { position: absolute; left: 0; top: 0; height: 100%; width: 0%; }
        #hp-fill { background: #2ecc71; width: 100%; }
        #super-fill { background: #f1c40f; }
        #hyper-fill { background: #9b59b6; }
        .hud-text { z-index: 32; text-shadow: 1px 1px #000; }

        /* РЕЗУЛЬТАТИ */
        #result-screen { background: #060814; text-align: center; padding-top: 60px; box-sizing: border-box; }
        .reward-grid { display: flex; justify-content: center; gap: 40px; margin: 40px 0; font-size: 26px; }
    </style>
</head>
<body>

    <!-- 1. ГОЛОВНЕ МЕНЮ -->
    <div id="menu-screen" class="screen active">
        <div class="top-bar">
            <div class="stat">🏆 КУБКИ: <span id="m-trophies">0</span></div>
            <div class="stat">💎 ГЕМИ: <span id="m-gems">50</span></div>
            <div class="stat">🟣 БЛІНГИ: <span id="m-blings">100</span></div>
            <div class="stat">✉️ КРЕДИТИ: <span id="m-credits">0</span></div>
        </div>
        
        <!-- ЛІВЕ СЕРЕДНЄ МЕНЮ -->
        <div class="side-menu">
            <button class="side-btn" id="btn-shop">Магазин 🛒</button>
            <button class="side-btn" id="btn-brawlers">Бійці 🤼</button>
            <button class="side-btn" id="btn-starr-road">Дорога Старр 🚀</button>
        </div>

        <div class="center-lobby">
            <div class="game-title" style="font-size: 44px; text-shadow: 3px 3px #000;">BRAWL STARS</div>
            <div id="m-brawler-emoji" class="brawler-showcase">🤠</div>
            <div id="m-brawler-name" style="font-size: 24px; color: #f1c40f; text-shadow: 2px 2px #000; margin-bottom: 15px;">Shelly</div>
            <button class="main-play-btn" id="btn-main-play">В БІЙ! ⚔️</button>
        </div>

        <!-- А) ВІКНО МАГАЗИНУ -->
        <div id="shop-screen" class="sub-screen">
            <div class="sub-header">
                <h2>МАГАЗИН АКЦІЙ 🛒</h2>
                <button class="back-btn" id="back-shop">Назад</button>
            </div>
            <div style="font-size: 15px; margin-bottom: 10px; color:#🟣">Твої Блінги: 🟣 <span id="shop-blings">100</span> | Геми: 💎 <span id="shop-gems">50</span></div>
            
            <div class="shop-section-title">🔥 НАЙКРАЩІ АКЦІЇ (БІЙЦІ ТА ПОДАРУНКИ)</div>
            <div class="grid-scroll" id="shop-actions-list">
                <!-- Щоденні безкоштовні речі та акції бійців генеруються в JS -->
            </div>
        </div>

        <!-- Б) ВІКНО БІЙЦІВ -->
        <div id="brawlers-screen" class="sub-screen">
            <div class="sub-header">
                <h2>СПИСОК БІЙЦІВ 🤼</h2>
                <button class="back-btn" id="back-brawlers">Назад</button>
            </div>
            <div class="grid-scroll" id="menu-brawlers-list"></div>
        </div>

        <!-- В) ВІКНО ДОРОГИ СТАРР -->
        <div id="starr-screen" class="sub-screen">
            <div class="sub-header">
                <h2>ПОТОЧНА ДОРОГА СТАРР 🚀</h2>
                <button class="back-btn" id="back-starr">Назад</button>
            </div>
